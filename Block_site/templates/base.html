<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-shape bg-one"></div>
    <div class="bg-shape bg-two"></div>

    <header class="site-header">
        <div class="container nav-wrap">
            <a href="{{ url_for('home') }}" class="logo">Manga Block</a>
            <nav>
                <ul class="nav-links">
                    <li><a class="{{ 'active' if request.endpoint == 'home' else '' }}" href="{{ url_for('home') }}">Home</a></li>
                    <li><a class="{{ 'active' if request.endpoint == 'catalog' else '' }}" href="{{ url_for('catalog') }}">Catalog</a></li>
                    <li><a class="{{ 'active' if request.endpoint == 'trending' else '' }}" href="{{ url_for('trending') }}">Trending</a></li>
                    <li><a class="{{ 'active' if request.endpoint == 'updates' else '' }}" href="{{ url_for('updates') }}">Updates</a></li>
                    <li><a class="{{ 'active' if request.endpoint == 'genres' else '' }}" href="{{ url_for('genres') }}">Genres</a></li>
                    <li><a class="{{ 'active' if request.endpoint == 'about' else '' }}" href="{{ url_for('about') }}">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>2026 Manga Block. Read smart, read fast.</p>
        </div>
    </footer>
</body>
</html>
